version: 1
disable_existing_loggers: False
filters:
  # Define a unique name for your filter
  path_filter:
    # 1. Specify the fully qualified path to your class
    (): kasa_webhook.logging_filter.AccessPathFilter
    excluded_paths:
      - "/ping"
      - "/deepping"
formatters:
  default:
    # "()": uvicorn.logging.DefaultFormatter
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  access:
    # "()": uvicorn.logging.AccessFormatter
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
loggers:
  uvicorn.error:
    level: INFO
    handlers:
      - default
    propagate: no
  uvicorn.access:
    level: INFO
    handlers:
      - access
    propagate: no
    filters: [path_filter]
root:
  level: DEBUG
  handlers:
    - default
  propagate: no
